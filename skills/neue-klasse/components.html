<!-- Neue Klasse — slide-type templates. Base CSS is neutral; the look lives in chrome.css.
     Every content slide is a bounded island: nk-head (flow-head) pins the masthead,
     nk-stage (flow-stage) fills, nk-foot (flow-foot) pins the source. Exhibits use the
     neutral fill utilities (flow-grid-fill / flow-grow / flow-fill) so content occupies
     the whole slide instead of clustering under the headline. -->

<template id="slide-cover">
<section class="slide dark">
  <div class="nk-cover">
    <div class="top">
      <div class="nk-mast"><b style="color:#fff">BMW Group</b><span class="nk-mbar"><i></i><i></i><i></i></span></div>
      <div style="font-family:var(--font-data);font-size:14px;color:rgba(255,255,255,0.62)">{{doc-label}}</div>
    </div>
    <div class="mid">
      <div class="kicker">{{kicker}}</div>
      <h1>{{title}}</h1>
      <div class="sub">{{subtitle}}</div>
    </div>
    <div class="bottom">
      <span>{{confidentiality}}</span>
      <span><b>{{date}}</b></span>
    </div>
  </div>
</section>
</template>

<template id="slide-executive-summary">

      <div class="nk-mast"><b>BMW Group</b><span class="nk-mbar"><i></i><i></i><i></i></span><span class="muted">Neue Klasse</span></div>
      <div class="nk-page">{{page-no}} / {{page-total}}</div>
    </div>
    <div class="nk-stage flow-stage">
      <div class="nk-eyebrow">{{eyebrow}}</div>
      <h2 class="nk-title">{{action-title}}</h2>
      <div class="nk-exec flow-grid-fill">

        <div class="pt flow-fill flow-fill-body flow-center"><div class="n">02</div><h4>{{p2-title}}</h4><p>{{p2-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n">03</div><h4>{{p3-title}}</h4><p>{{p3-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n">04</div><h4>{{p4-title}}</h4><p>{{p4-body}}</p></div>
      </div>
      <div class="nk-conclude"><span class="lbl">Recommendation</span><p>{{conclusion}}</p></div>
    </div>
    <div class="nk-foot flow-foot"><span class="src">{{source}}</span><span>{{section}}</span></div>
  </div>
</section>
</template>
