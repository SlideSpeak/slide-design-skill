<!-- Training components -->

<template id="slide-cover">
<section class="slide slide-cover">
  <div style="display:flex; flex-direction:column; justify-content:center; height:100%; gap: 40px; max-width: 1500px;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">{{audience-level}} · {{duration}}</div>
    <h1 style="line-height: 1.05; letter-spacing: -0.02em;">{{workshop-title}}</h1>
    <div style="margin-top: 32px; display:flex; flex-direction:column; gap: 8px;">
      <div style="font-size: 24px;">{{instructor-name}}</div>
      <div style="color: var(--color-muted); font-family: var(--font-data); font-size: 16px;">{{date}} · {{location}}</div>
    </div>
  </div>
</section>
</template>

<template id="slide-agenda">
<section class="slide slide-agenda">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:flex; flex-direction:column; gap: 16px; max-width: 1400px; width:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 24px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 24px; font-weight: 600;"><span style="font-family: var(--font-data); color: var(--color-signal); margin-right: 16px;">01</span>{{module-1-title}}</div><div style="font-family: var(--font-data); color: var(--color-muted);">{{module-1-duration}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 24px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 24px; font-weight: 600;"><span style="font-family: var(--font-data); color: var(--color-signal); margin-right: 16px;">02</span>{{module-2-title}}</div><div style="font-family: var(--font-data); color: var(--color-muted);">{{module-2-duration}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 24px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 24px; font-weight: 600;"><span style="font-family: var(--font-data); color: var(--color-signal); margin-right: 16px;">03</span>{{module-3-title}}</div><div style="font-family: var(--font-data); color: var(--color-muted);">{{module-3-duration}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 24px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 24px; font-weight: 600;"><span style="font-family: var(--font-data); color: var(--color-signal); margin-right: 16px;">04</span>{{module-4-title}}</div><div style="font-family: var(--font-data); color: var(--color-muted);">{{module-4-duration}}</div></div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-objectives">
<section class="slide slide-objectives">
  <div style="display:flex; flex-direction:column; height:100%;">
    <h2>{{headline}}</h2>
    <div style="font-size: 24px; color: var(--color-muted); margin-top: 24px;">By the end you will be able to:</div>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:flex; flex-direction:column; gap: 32px; max-width: 1400px; width:100%;">
      <div style="display:flex; gap: 24px; align-items:flex-start;"><div style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--color-signal); flex-shrink:0; display:flex; align-items:center; justify-content:center; color: var(--color-signal); font-weight: 700;">✓</div><div style="font-size: 26px; line-height: 1.4;">{{objective-1}}</div></div>
      <div style="display:flex; gap: 24px; align-items:flex-start;"><div style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--color-signal); flex-shrink:0; display:flex; align-items:center; justify-content:center; color: var(--color-signal); font-weight: 700;">✓</div><div style="font-size: 26px; line-height: 1.4;">{{objective-2}}</div></div>
      <div style="display:flex; gap: 24px; align-items:flex-start;"><div style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--color-signal); flex-shrink:0; display:flex; align-items:center; justify-content:center; color: var(--color-signal); font-weight: 700;">✓</div><div style="font-size: 26px; line-height: 1.4;">{{objective-3}}</div></div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-module-intro">
<section class="slide slide-module-intro" style="background: var(--color-signal); color: var(--color-card);">
  <div style="display:flex; flex-direction:column; justify-content:center; height:100%; gap: 32px; max-width: 1500px; color: var(--color-card);">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); opacity: 0.7;">Module {{module-number}}</div>
    <h1 style="line-height: 1.05; letter-spacing: -0.02em; color: var(--color-card);">{{module-title}}</h1>
    <div style="font-size: 24px; line-height: 1.5; opacity: 0.85; margin-top: 32px;">{{why-this-matters}}</div>
  </div>
</section>
</template>

<template id="slide-concept">
<section class="slide slide-concept">
  <div class="slide-flow">
    <h2 style="max-width: 1700px;">{{headline}}</h2>
    <div style="font-size: 26px; line-height: 1.6; max-width: 1500px;">{{concept-body}}</div>
    <div class="flow-grow" style="padding: 48px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card); max-width: 1500px; display:flex; flex-direction:column; gap: 24px; justify-content:center;">
      <div style="font-family: var(--font-data); font-size: 15px; color: var(--color-signal);">{{example-label}}</div>
      <div style="font-size: 24px; line-height: 1.6;">{{example-body}}</div>
    </div>
  </div>
</section>
</template>

<template id="slide-exercise">
<section class="slide slide-exercise">
  <div style="display:flex; flex-direction:column; height:100%;">
    <div style="display:flex; gap: 16px; align-items:center; margin-bottom: 32px;">
      <div style="background: #EA580C; color: var(--color-card); padding: 8px 16px; border-radius: 999px; font-family: var(--font-data); font-size: var(--size-body-4); font-weight: 600;">Exercise · {{time-box}}</div>
    </div>
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; gap: 40px;">
      <div style="font-size: 26px; line-height: 1.5; max-width: 1500px;">{{task}}</div>
      <div style="padding: 24px; border-left: 4px solid #EA580C; background: var(--color-card); max-width: 1500px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: #EA580C; margin-bottom: 8px;">Success criteria</div>
        <div style="font-size: 20px; line-height: 1.4;">{{success-criteria}}</div>
      </div>
    </div>
  </div>
</section>
</template>

<template id="slide-demonstration">
<section class="slide slide-demonstration">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:flex; flex-direction:column; gap: 28px; max-width: 1500px; width:100%;">
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; min-width: 32px;">01</span><div style="font-size: 22px; line-height: 1.5;">{{step-1}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; min-width: 32px;">02</span><div style="font-size: 22px; line-height: 1.5;">{{step-2}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; min-width: 32px;">03</span><div style="font-size: 22px; line-height: 1.5;">{{step-3}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; min-width: 32px;">04</span><div style="font-size: 22px; line-height: 1.5;">{{step-4}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; min-width: 32px;">05</span><div style="font-size: 22px; line-height: 1.5;">{{step-5}}</div></div>
    </div>
    </div>
    <div style="font-family: var(--font-data); color: var(--color-muted); font-size: 16px;">{{code-caption}}</div>
  </div>
</section>
</template>

<template id="slide-debrief">
<section class="slide slide-debrief">
  <div style="display:flex; flex-direction:column; height: 100%; max-width: 1500px;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal); margin-bottom: 48px;">Debrief</div>
    <h2 style="line-height: 1.1;">{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:flex; flex-direction:column; gap: 40px; width:100%;">
    <div style="padding: 32px; background: var(--color-card); border-radius: var(--radius-card); border-left: 4px solid var(--color-signal);">
      <div style="font-style: italic; font-size: 26px; line-height: 1.4;">{{reflective-question}}</div>
    </div>
    <div style="display:flex; flex-direction:column; gap: 20px;">
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600;">→</span><div style="font-size: 22px; line-height: 1.5;">{{takeaway-1}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600;">→</span><div style="font-size: 22px; line-height: 1.5;">{{takeaway-2}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600;">→</span><div style="font-size: 22px; line-height: 1.5;">{{takeaway-3}}</div></div>
    </div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-resources">
<section class="slide slide-resources">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:flex; flex-direction:column; gap: 16px; max-width: 1500px; width:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 22px; font-weight: 600;">{{resource-1-name}}</div><div style="font-family: var(--font-data); color: var(--color-signal); font-size: 16px;">{{resource-1-url}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 22px; font-weight: 600;">{{resource-2-name}}</div><div style="font-family: var(--font-data); color: var(--color-signal); font-size: 16px;">{{resource-2-url}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 22px; font-weight: 600;">{{resource-3-name}}</div><div style="font-family: var(--font-data); color: var(--color-signal); font-size: 16px;">{{resource-3-url}}</div></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px 32px; background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--elevation-card);"><div style="font-size: 22px; font-weight: 600;">{{resource-4-name}}</div><div style="font-family: var(--font-data); color: var(--color-signal); font-size: 16px;">{{resource-4-url}}</div></div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-closing">
<section class="slide slide-closing">
  <div style="display:flex; flex-direction:column; justify-content:center; height:100%; gap: 32px; max-width: 1500px;">
    <h1 style="line-height: 1.05;">{{headline}}</h1>
    <div style="margin-top: 32px; display:flex; flex-direction:column; gap: 24px;">
      <div style="display:flex; gap: 24px; align-items:baseline;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: var(--size-body-4); min-width: 180px;">Do next</div><div style="font-size: 22px;">{{next-action}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: var(--size-body-4); min-width: 180px;">Support</div><div style="font-size: 22px;">{{support-channel}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: var(--size-body-4); min-width: 180px;">Instructor</div><div style="font-size: 22px;">{{instructor-contact}}</div></div>
    </div>
  </div>
</section>
</template>
