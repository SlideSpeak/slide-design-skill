<!-- Academic components -->

<template id="slide-title">
<section class="slide slide-title">
  <div class="slide-flow" style="padding-bottom: 0;">
    <div style="flex: 1; display:flex; flex-direction:column; justify-content:center; gap: 28px; max-width: 1500px;">
      <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{venue}} · {{date}}</div>
      <h1 style="font-style: italic; line-height: 1.1;">{{paper-title}}</h1>
      <div style="font-size: 28px; color: var(--color-ink); margin-top: 16px;">{{authors}}</div>
      <div style="font-size: 20px; color: var(--color-muted); font-style: italic;">{{affiliation}}</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:baseline; border-top: 1px solid var(--color-rule); padding-top: 16px; font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">
      <span>{{venue}}</span>
      <span>{{doi}}</span>
    </div>
  </div>
</section>
</template>

<template id="slide-motivation">
<section class="slide slide-motivation">
  <div class="slide-flow">
    <h2 style="max-width: 1700px;">{{headline}}</h2>
    <div class="flow-grow" style="font-size: 26px; line-height: 1.6; max-width: 1500px;">{{body}}</div>
    <div style="border-top: 1px solid var(--color-rule); padding-top: 16px; display:flex; flex-direction:column; gap: 8px; font-family: var(--font-data); font-size: 15px; color: var(--color-muted);">
      <div>[1] {{citation-1}}</div>
      <div>[2] {{citation-2}}</div>
      <div>[3] {{citation-3}}</div>
    </div>
  </div>
</section>
</template>

<template id="slide-research-question">
<section class="slide slide-rq">
  <div class="slide-flow" style="padding-bottom: 0;">
    <div style="flex: 1; display:flex; flex-direction:column; justify-content:center; gap: 48px; max-width: 1500px;">
      <h2 style="color: var(--color-signal); font-style: italic;">{{headline}}</h2>
      <div style="font-size: 42px; line-height: 1.3; font-style: italic;">{{question}}</div>
      <div style="margin-top: 32px; display:flex; flex-direction:column; gap: 20px; font-size: 24px; color: var(--color-muted);">
        <div>(a) {{sub-question-1}}</div>
        <div>(b) {{sub-question-2}}</div>
        <div>(c) {{sub-question-3}}</div>
      </div>
    </div>
  </div>
</section>
</template>

<template id="slide-method">
<section class="slide slide-method">
  <div class="slide-flow">
    <h2>{{headline}}</h2>
    <div class="flow-grow" style="display:flex; align-items:center;">
      <div style="display:flex; align-items:stretch; gap: 0; width:100%;">
        <div style="flex:1; border-top: 2px solid var(--color-ink); padding-top: 24px; padding-right: 28px; display:flex; flex-direction:column; gap: 16px;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px;">i.</div><div style="font-size: 22px; line-height: 1.45;">{{step-1}}</div></div>
        <div style="flex:1; border-top: 2px solid var(--color-ink); padding-top: 24px; padding-left: 28px; padding-right: 28px; border-left: 1px solid var(--color-rule); display:flex; flex-direction:column; gap: 16px;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px;">ii.</div><div style="font-size: 22px; line-height: 1.45;">{{step-2}}</div></div>
        <div style="flex:1; border-top: 2px solid var(--color-ink); padding-top: 24px; padding-left: 28px; padding-right: 28px; border-left: 1px solid var(--color-rule); display:flex; flex-direction:column; gap: 16px;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px;">iii.</div><div style="font-size: 22px; line-height: 1.45;">{{step-3}}</div></div>
        <div style="flex:1; border-top: 2px solid var(--color-ink); padding-top: 24px; padding-left: 28px; padding-right: 28px; border-left: 1px solid var(--color-rule); display:flex; flex-direction:column; gap: 16px;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px;">iv.</div><div style="font-size: 22px; line-height: 1.45;">{{step-4}}</div></div>
        <div style="flex:1; border-top: 2px solid var(--color-ink); padding-top: 24px; padding-left: 28px; border-left: 1px solid var(--color-rule); display:flex; flex-direction:column; gap: 16px;"><div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px;">v.</div><div style="font-size: 22px; line-height: 1.45;">{{step-5}}</div></div>
      </div>
    </div>
    <div style="font-family: var(--font-data); font-size: 15px; color: var(--color-muted); border-top: 1px solid var(--color-rule); padding-top: 12px;">{{diagram-caption}}</div>
  </div>
</section>
</template>

<template id="slide-result-figure">
<section class="slide slide-result">
  <div class="slide-flow">
    <h3>{{headline}}</h3>
    <div style="font-size: 28px; line-height: 1.4; font-style: italic; color: var(--color-signal); max-width: 1500px;">{{finding}}</div>
    <div class="flow-grow" style="border: 1px solid var(--color-rule); display:flex; align-items:center; justify-content:center; color: var(--color-muted); font-family: var(--font-data); font-size: 16px;">Figure · {{figure-caption}}</div>
    <div style="font-family: var(--font-data); font-size: 14px; color: var(--color-muted); border-top: 1px solid var(--color-rule); padding-top: 12px;">{{source}} · {{n-note}}</div>
  </div>
</section>
</template>

<template id="slide-prior-work">
<section class="slide slide-prior-work">
  <div class="slide-flow">
    <h2>{{headline}}</h2>
    <div class="flow-grow-evenly" style="max-width: 1600px; font-size: 22px; line-height: 1.5;">
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); min-width: 32px;">[1]</span><div><span style="font-style: italic;">{{entry-1-citation}}</span> · {{entry-1-blurb}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); min-width: 32px;">[2]</span><div><span style="font-style: italic;">{{entry-2-citation}}</span> · {{entry-2-blurb}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); min-width: 32px;">[3]</span><div><span style="font-style: italic;">{{entry-3-citation}}</span> · {{entry-3-blurb}}</div></div>
      <div style="display:flex; gap: 24px; align-items:baseline;"><span style="font-family: var(--font-data); color: var(--color-signal); min-width: 32px;">[4]</span><div><span style="font-style: italic;">{{entry-4-citation}}</span> · {{entry-4-blurb}}</div></div>
    </div>
  </div>
</section>
</template>

<template id="slide-data">
<section class="slide slide-data">
  <div class="slide-flow">
    <h2>{{headline}}</h2>
    <div class="flow-grow" style="display:grid; grid-template-columns: 1fr 1fr; gap: 96px; align-items:center;">
      <div>
        <div style="font-family: var(--font-header); font-weight: 600; font-size: 196px; line-height: 0.9; color: var(--color-signal); letter-spacing: -0.03em;">{{n-value}}</div>
        <div style="font-family: var(--font-data); margin-top: 16px; color: var(--color-muted); font-size: 18px;">{{n-label}}</div>
      </div>
      <div style="border-left: 1px solid var(--color-rule); padding-left: 40px; display:flex; flex-direction:column; gap: 20px;">
        <div style="font-style: italic; font-size: 28px;">{{dataset-name}}</div>
        <div style="color: var(--color-muted); font-size: 20px;">{{period}}</div>
        <div style="color: var(--color-muted); font-size: 17px; font-family: var(--font-data); margin-top: 12px; line-height: 1.5;">{{source}}</div>
      </div>
    </div>
    <div style="font-size: 17px; color: var(--color-muted); font-style: italic; border-top: 1px solid var(--color-rule); padding-top: 12px; max-width: 1600px;">{{notes}}</div>
  </div>
</section>
</template>

<template id="slide-result-table">
<section class="slide slide-result-table">
  <div class="slide-flow">
    <h3>{{headline}}</h3>
    <div style="font-size: 26px; line-height: 1.4; font-style: italic; color: var(--color-signal); max-width: 1500px;">{{finding}}</div>
    <div class="flow-grow" style="border-top: 2px solid var(--color-ink); padding-top: 16px; display:flex; flex-direction:column; gap: 16px;">
      <div style="font-family: var(--font-data); font-size: 15px; color: var(--color-muted); padding-bottom: 16px; border-bottom: 1px solid var(--color-rule);">{{table-headers}}</div>
      <div style="font-family: var(--font-data); font-size: 18px; line-height: 1.9; white-space: pre-line;">{{table-rows}}</div>
    </div>
    <div style="font-family: var(--font-data); font-size: 14px; color: var(--color-muted); border-top: 1px solid var(--color-rule); padding-top: 12px;">{{source}}</div>
  </div>
</section>
</template>

<template id="slide-discussion">
<section class="slide slide-discussion">
  <div class="slide-flow">
    <h2>{{headline}}</h2>
    <div class="flow-grow" style="display:grid; grid-template-columns: 1fr 1fr; gap: 80px;">
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: 15px; color: var(--color-signal);">Implications</div>
        <div style="display:flex; flex-direction:column; gap: 24px; font-size: 22px; line-height: 1.5;">
          <div style="border-top: 1px solid var(--color-rule); padding-top: 16px;">{{implication-1}}</div>
          <div style="border-top: 1px solid var(--color-rule); padding-top: 16px;">{{implication-2}}</div>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: 15px; color: var(--color-muted);">Limitations</div>
        <div style="display:flex; flex-direction:column; gap: 24px; font-size: 22px; line-height: 1.5; font-style: italic; color: var(--color-muted);">
          <div style="border-top: 1px solid var(--color-rule); padding-top: 16px;">{{limitation-1}}</div>
          <div style="border-top: 1px solid var(--color-rule); padding-top: 16px;">{{limitation-2}}</div>
        </div>
      </div>
    </div>
    <div style="border-top: 1px solid var(--color-rule); padding-top: 16px; font-family: var(--font-data); font-size: 16px; color: var(--color-muted); font-style: italic;">Future work: {{future-work}}</div>
  </div>
</section>
</template>

<template id="slide-references">
<section class="slide slide-references">
  <div class="slide-flow">
    <h3>{{headline}}</h3>
    <div class="flow-grow" style="font-family: var(--font-data); font-size: 15px; line-height: 1.8; color: var(--color-muted); white-space: pre-line; max-width: 1700px; overflow-y: auto; column-count: 2; column-gap: 64px;">{{ref-list}}</div>
  </div>
</section>
</template>

<template id="slide-conclusion">
<section class="slide slide-conclusion">
  <div class="slide-flow">
    <h2>{{headline}}</h2>
    <div class="flow-grow" style="display:flex; align-items:center;">
      <div style="max-width: 1600px; width:100%; display:flex; flex-direction:column; gap: 48px;">
        <div style="display:flex; gap: 32px; align-items:baseline; border-top: 1px solid var(--color-rule); padding-top: 32px;">
          <div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px; min-width: 40px;">01</div>
          <div style="font-size: 34px; line-height: 1.4;">{{takeaway-1}}</div>
        </div>
        <div style="display:flex; gap: 32px; align-items:baseline; border-top: 1px solid var(--color-rule); padding-top: 32px;">
          <div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px; min-width: 40px;">02</div>
          <div style="font-size: 34px; line-height: 1.4;">{{takeaway-2}}</div>
        </div>
        <div style="display:flex; gap: 32px; align-items:baseline; border-top: 1px solid var(--color-rule); padding-top: 32px;">
          <div style="font-family: var(--font-data); color: var(--color-signal); font-weight: 600; font-size: 22px; min-width: 40px;">03</div>
          <div style="font-size: 34px; line-height: 1.4;">{{takeaway-3}}</div>
        </div>
      </div>
    </div>
  </div>
</section>
</template>

<template id="slide-qa">
<section class="slide slide-qa">
  <div class="slide-flow" style="padding-bottom: 0;">
    <div style="flex: 1; display:flex; flex-direction:column; justify-content:center; gap: 40px; max-width: 1500px;">
      <h2 style="font-style: italic;">{{headline}}</h2>
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-size: 28px;">{{contact-name}}</div>
        <div style="font-family: var(--font-data); color: var(--color-muted); font-size: 20px;">{{contact-email}}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap: 8px; margin-top: 24px; border-top: 1px solid var(--color-rule); padding-top: 24px;">
        <div style="font-family: var(--font-data); color: var(--color-signal); font-size: 17px;">Paper · {{paper-url}}</div>
        <div style="font-family: var(--font-data); color: var(--color-signal); font-size: 17px;">Code · {{code-url}}</div>
      </div>
    </div>
  </div>
</section>
</template>
