<!-- Operational Excellence — slide-type templates. Base CSS is neutral; the look lives
     in chrome.css. Every content slide is a bounded island: ox-head (flow-head) pins
     the masthead, ox-stage (flow-stage) fills, ox-foot (flow-foot) pins the source.
     Exhibits use the neutral fill utilities so content occupies the whole slide. -->

<template id="slide-cover">
<section class="slide dark">
  <div class="ox-cover">
    <div class="top">
      <div class="brand"><span class="sq"></span><b>Meridian Industrial Group</b></div>
      <div class="doc">{{doc-label}}</div>
    </div>
    <div class="mid">
      <div class="kicker">{{kicker}}</div>
      <h1>{{title}}</h1>
      <div class="sub">{{subtitle}}</div>
    </div>
    <div class="bottom">
      <span>{{confidentiality}}</span>
      <span><b>{{date}}</b></span>
    </div>
  </div>
</section>
</template>

<template id="slide-summary">
<section class="slide">
  <div class="ox slide-flow">
    <div class="ox-head flow-head">
      <div class="ox-mast"><span class="sq"></span><b>Meridian Industrial Group</b><span class="sep">|</span><span class="muted">Operational Excellence Program 2027</span></div>
      <div class="ox-page">{{page-no}} / {{page-total}}</div>
    </div>
    <div class="ox-stage flow-stage">
      <div class="ox-eyebrow">{{eyebrow}}</div>
      <h2 class="ox-title">{{action-title}}</h2>
      <div class="ox-sum flow-grid-fill">
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">01</div><h4>{{p1-title}}</h4><p>{{p1-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">02</div><h4>{{p2-title}}</h4><p>{{p2-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">03</div><h4>{{p3-title}}</h4><p>{{p3-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">04</div><h4>{{p4-title}}</h4><p>{{p4-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">05</div><h4>{{p5-title}}</h4><p>{{p5-body}}</p></div>
        <div class="pt flow-fill flow-fill-body flow-center"><div class="n" data-visual-event="item-marker">06</div><h4>{{p6-title}}</h4><p>{{p6-body}}</p></div>
      </div>
      <div class="ox-band"><span class="lbl">Core message</span><p>{{takeaway}}</p></div>
    </div>
    <div class="ox-foot flow-foot"><span class="src">{{source}}</span><span>{{section}}</span></div>
  </div>
</section>
</template>
