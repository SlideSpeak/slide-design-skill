<!-- __SKILL_NAME__ components -->

<template id="slide-cover">
<section class="slide slide-cover">
  <div style="display:flex; flex-direction:column; justify-content:center; height: 100%; gap: 32px; max-width: 1500px;">
    <h1>{{title}}</h1>
    <div style="font-size: 28px; color: var(--color-muted);">{{subtitle}}</div>
    <div style="font-family: var(--font-data); color: var(--color-muted); margin-top: 48px;">{{date}}</div>
  </div>
</section>
</template>

<template id="slide-content">
<section class="slide slide-content">
  <div style="display:flex; flex-direction:column; gap: 32px; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="font-size: 22px; line-height: 1.5;">{{body}}</div>
  </div>
</section>
</template>

<template id="slide-closing">
<section class="slide slide-closing">
  <div style="display:flex; flex-direction:column; justify-content:center; height: 100%; gap: 32px; max-width: 1400px;">
    <h1>{{headline}}</h1>
    <div style="margin-top: 32px; color: var(--color-muted);">{{contact}}</div>
  </div>
</section>
</template>
