<!-- Pitch components -->

<template id="slide-cover">
<section class="slide slide-cover" style="background: var(--color-page);">
  <div style="display:flex; flex-direction:column; justify-content:space-between; height:100%;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{date}} · {{round}}</div>
    <div style="display:flex; flex-direction:column; gap: 24px;">
      <div style="font-family: var(--font-header); font-weight: 700; font-size: 144px; line-height: 0.95; letter-spacing: -0.03em; color: var(--color-signal);">{{company-name}}</div>
      <div style="font-size: 36px; line-height: 1.2; max-width: 1400px; color: var(--color-ink); font-weight: 400;">{{tagline}}</div>
    </div>
    <div style="display:flex; justify-content:flex-end; font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">Confidential</div>
  </div>
</section>
</template>

<template id="slide-problem">
<section class="slide slide-problem">
  <div style="display:flex; flex-direction:column; justify-content:center; height:100%; max-width: 1500px;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal); margin-bottom: 48px;">The problem · {{persona}}</div>
    <h1 style="line-height: 1.05; letter-spacing: -0.02em;">{{headline}}</h1>
    <div style="margin-top: 48px; font-size: 28px; color: var(--color-muted); max-width: 1300px; font-weight: 400;">{{subhead}}</div>
  </div>
</section>
</template>

<template id="slide-market">
<section class="slide slide-market">
  <div style="display:flex; flex-direction:column; gap: 64px; height: 100%;">
    <h2 style="max-width: 1600px;">{{headline}}</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; margin-top: 48px; flex: 1; align-items: center;">
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">TAM</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 144px; line-height: 0.9; color: var(--color-ink); letter-spacing: -0.03em;">{{tam-value}}</div>
        <div style="font-size: 18px; color: var(--color-muted);">{{tam-label}}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">SAM</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 144px; line-height: 0.9; color: var(--color-ink); letter-spacing: -0.03em;">{{sam-value}}</div>
        <div style="font-size: 18px; color: var(--color-muted);">{{sam-label}}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">SOM</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 144px; line-height: 0.9; color: var(--color-signal); letter-spacing: -0.03em;">{{som-value}}</div>
        <div style="font-size: 18px; color: var(--color-muted);">{{som-label}}</div>
      </div>
    </div>
    <div style="font-size: var(--size-body-4); color: var(--color-muted);">{{source}}</div>
  </div>
</section>
</template>

<template id="slide-solution">
<section class="slide slide-solution">
  <div style="display:flex; flex-direction:column; height:100%;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal); margin-bottom: 24px;">Solution</div>
    <h2 style="line-height: 1.05; letter-spacing: -0.02em; max-width: 1500px;">{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; gap: 48px;">
      <div style="font-size: 28px; line-height: 1.5; color: var(--color-muted); max-width: 1400px;">{{body}}</div>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 40px;">
        <div style="border-top: 4px solid var(--color-signal); padding-top: 24px; font-weight: 600; font-size: 23px; line-height: 1.35;">{{feature-1}}</div>
        <div style="border-top: 4px solid var(--color-signal); padding-top: 24px; font-weight: 600; font-size: 23px; line-height: 1.35;">{{feature-2}}</div>
        <div style="border-top: 4px solid var(--color-signal); padding-top: 24px; font-weight: 600; font-size: 23px; line-height: 1.35;">{{feature-3}}</div>
      </div>
    </div>
  </div>
</section>
</template>

<template id="slide-traction">
<section class="slide slide-traction">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; width:100%;">
        <div style="border-top: 4px solid var(--color-signal); padding-top: 28px; display:flex; flex-direction:column; gap: 16px;">
          <div style="font-family: var(--font-header); font-weight: 700; font-size: 124px; line-height: 0.9; letter-spacing: -0.02em; color: var(--color-ink);">{{metric-1-value}}</div>
          <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{metric-1-label}}</div>
        </div>
        <div style="border-top: 4px solid var(--color-signal); padding-top: 28px; display:flex; flex-direction:column; gap: 16px;">
          <div style="font-family: var(--font-header); font-weight: 700; font-size: 124px; line-height: 0.9; letter-spacing: -0.02em; color: var(--color-ink);">{{metric-2-value}}</div>
          <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{metric-2-label}}</div>
        </div>
        <div style="border-top: 4px solid var(--color-signal); padding-top: 28px; display:flex; flex-direction:column; gap: 16px;">
          <div style="font-family: var(--font-header); font-weight: 700; font-size: 124px; line-height: 0.9; letter-spacing: -0.02em; color: var(--color-ink);">{{metric-3-value}}</div>
          <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{metric-3-label}}</div>
        </div>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size: var(--size-body-4); color: var(--color-muted);"><span>{{chart-caption}}</span><span>{{source}}</span></div>
  </div>
</section>
</template>

<template id="slide-business-model">
<section class="slide slide-pricing">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; width:100%;">
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 32px; display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{tier-1-name}}</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 64px; line-height: 1; color: var(--color-ink);">{{tier-1-price}}</div>
        <div style="font-size: var(--size-body-2); color: var(--color-muted);">{{tier-1-blurb}}</div>
      </div>
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 32px; display:flex; flex-direction:column; gap: 16px; border: 2px solid var(--color-signal);">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">{{tier-2-name}} · most common</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 64px; line-height: 1; color: var(--color-ink);">{{tier-2-price}}</div>
        <div style="font-size: var(--size-body-2); color: var(--color-muted);">{{tier-2-blurb}}</div>
      </div>
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 32px; display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{tier-3-name}}</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 64px; line-height: 1; color: var(--color-ink);">{{tier-3-price}}</div>
        <div style="font-size: var(--size-body-2); color: var(--color-muted);">{{tier-3-blurb}}</div>
      </div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-team">
<section class="slide slide-team">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 80px; width:100%;">
      <div style="border-top: 4px solid var(--color-signal); padding-top: 28px; display:flex; flex-direction:column; gap: 12px;">
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 40px; line-height: 1.05;">{{founder-1-name}}</div>
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal); margin-bottom: 12px;">{{founder-1-role}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-1-cred-1}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-1-cred-2}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-1-cred-3}}</div>
      </div>
      <div style="border-top: 4px solid var(--color-signal); padding-top: 28px; display:flex; flex-direction:column; gap: 12px;">
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 40px; line-height: 1.05;">{{founder-2-name}}</div>
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal); margin-bottom: 12px;">{{founder-2-role}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-2-cred-1}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-2-cred-2}}</div>
        <div style="font-size: 20px; color: var(--color-muted); line-height: 1.4;">{{founder-2-cred-3}}</div>
      </div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-why-now">
<section class="slide slide-why-now">
  <div style="display:flex; flex-direction:column; justify-content:center; height: 100%; max-width: 1500px; gap: 36px;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">Why now</div>
    <h1 style="line-height: 1.05; letter-spacing: -0.02em;">{{headline}}</h1>
    <div style="font-size: 28px; line-height: 1.5; color: var(--color-muted); max-width: 1300px;">{{body}}</div>
    <div style="display:flex; gap: 16px; align-items:baseline; padding-top: 24px; border-top: 1px solid var(--color-rule);"><span style="color: var(--color-signal); font-weight: 700; font-family: var(--font-data);">↗</span><div style="font-size: 22px; color: var(--color-ink); font-weight: 600;">{{trend-line}}</div></div>
    <div style="font-size: var(--size-body-4); color: var(--color-muted);">{{source}}</div>
  </div>
</section>
</template>

<template id="slide-gtm">
<section class="slide slide-gtm">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; align-items:center;">
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; width:100%;">
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 40px; display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">Channel 01</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 36px; line-height: 1.05;">{{channel-1-name}}</div>
        <div style="font-size: 18px; color: var(--color-muted); line-height: 1.5;">{{channel-1-body}}</div>
      </div>
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 40px; display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">Channel 02</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 36px; line-height: 1.05;">{{channel-2-name}}</div>
        <div style="font-size: 18px; color: var(--color-muted); line-height: 1.5;">{{channel-2-body}}</div>
      </div>
      <div style="background: var(--color-card); border-radius: var(--radius-card); padding: 40px; display:flex; flex-direction:column; gap: 16px;">
        <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">Channel 03</div>
        <div style="font-family: var(--font-header); font-weight: 700; font-size: 36px; line-height: 1.05;">{{channel-3-name}}</div>
        <div style="font-size: 18px; color: var(--color-muted); line-height: 1.5;">{{channel-3-body}}</div>
      </div>
    </div>
    </div>
  </div>
</section>
</template>

<template id="slide-competition">
<section class="slide slide-competition">
  <div style="display:flex; flex-direction:column; height: 100%;">
    <h2>{{headline}}</h2>
    <div style="flex:1; min-height:0; display:flex; gap: 20px; margin-top: 24px;">
      <div style="writing-mode: vertical-rl; transform: rotate(180deg); display:flex; align-items:center; justify-content:center; font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{y-axis-label}} →</div>
      <div style="flex:1; display:flex; flex-direction:column; gap: 14px; min-height:0;">
        <div style="flex:1; display:grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; border:1px solid var(--color-rule); min-height:0;">
          <div style="border-right:1px solid var(--color-rule); border-bottom:1px solid var(--color-rule); padding: 32px; display:flex; align-items:flex-start;"><div style="font-family: var(--font-data); font-size: var(--size-body-3); color: var(--color-muted); line-height: 1.3;">{{competitor-1-label}}</div></div>
          <div style="border-bottom:1px solid var(--color-rule); padding: 32px; background: var(--color-signal); color: var(--color-card); display:flex; flex-direction:column; justify-content:flex-end; gap: 8px;"><div style="font-family: var(--font-data); font-size: var(--size-body-4); opacity: 0.85;">{{us-label}}</div><div style="font-family: var(--font-header); font-weight: 700; font-size: 40px; line-height: 1;">That's us</div></div>
          <div style="border-right:1px solid var(--color-rule); padding: 32px; display:flex; align-items:flex-end;"><div style="font-family: var(--font-data); font-size: var(--size-body-3); color: var(--color-muted); line-height: 1.3;">{{competitor-3-label}}</div></div>
          <div style="padding: 32px; display:flex; align-items:flex-end; justify-content:flex-end;"><div style="font-family: var(--font-data); font-size: var(--size-body-3); color: var(--color-muted); line-height: 1.3; text-align:right;">{{competitor-2-label}}</div></div>
        </div>
        <div style="text-align:center; font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-muted);">{{x-axis-label}} →</div>
      </div>
    </div>
  </div>
</section>
</template>

<template id="slide-ask">
<section class="slide slide-ask">
  <div style="display:flex; flex-direction:column; justify-content:space-between; height: 100%;">
    <div style="font-family: var(--font-data); font-size: var(--size-body-4); color: var(--color-signal);">The ask</div>
    <div style="display:flex; flex-direction:column; gap: 48px;">
      <div style="font-family: var(--font-header); font-weight: 700; font-size: 220px; line-height: 0.9; color: var(--color-signal); letter-spacing: -0.04em;">{{ask-amount}}</div>
      <h3 style="font-weight: 400; color: var(--color-muted); max-width: 1400px;">{{headline}}</h3>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 32px; max-width: 1400px; margin-top: 32px;">
        <div style="border-top: 2px solid var(--color-signal); padding-top: 16px;"><div style="font-weight: 600;">{{use-1}}</div></div>
        <div style="border-top: 2px solid var(--color-signal); padding-top: 16px;"><div style="font-weight: 600;">{{use-2}}</div></div>
        <div style="border-top: 2px solid var(--color-signal); padding-top: 16px;"><div style="font-weight: 600;">{{use-3}}</div></div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap: 4px;">
      <div style="font-weight: 600;">{{contact-name}}</div>
      <div style="color: var(--color-muted); font-family: var(--font-data);">{{contact-email}}</div>
    </div>
  </div>
</section>
</template>
